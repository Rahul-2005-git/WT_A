<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        h1 { margin-bottom: 30px; font-size: 2em; }
        .signal-box {
            width: 130px;
            padding: 25px;
            background: #222;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #444;
        }
        .light {
            width: 70px;
            height: 70px;
            margin: 12px 0;
            border-radius: 50%;
            background: #333;
            transition: 0.4s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .red.active {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc0000);
            box-shadow: 0 0 20px #ff0000, 0 0 40px #cc0000, inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .yellow.active {
            background: radial-gradient(circle at 30% 30%, #ffff00, #ccaa00);
            box-shadow: 0 0 20px #ffff00, 0 0 40px #ffaa00, inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .green.active {
            background: radial-gradient(circle at 30% 30%, #00ff00, #00aa00);
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00cc00, inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .label { font-size: 0.8em; color: #aaa; margin-top: 10px; }
        .timer-display {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffff00;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(255,255,0,0.5);
            min-width: 40px;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .start-btn { background: #00cc00; color: white; }
        .start-btn:hover { background: #00aa00; }
        .stop-btn { background: #cc0000; color: white; }
        .stop-btn:hover { background: #990000; }
        @media (max-width: 500px) {
            .signal-box { width: 110px; padding: 20px; }
            .light { width: 60px; height: 60px; }
            button { padding: 8px 15px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <h1>🚦 Traffic Signal</h1>
    <div class="signal-box">
        <div id="red" class="light red"></div>
        <div id="yellow" class="light yellow"></div>
        <div id="green" class="light green"></div>
        <div class="label">Signal 1</div>
        <div class="timer-display" id="timer">-</div>
    </div>
    <div class="controls">
        <button class="start-btn" onclick="startSignal()">Start</button>
        <button class="stop-btn" onclick="stopSignal()">Stop</button>
    </div>

    <script>
        let interval;
        let state = 0;
        let timeLeft = 2;

        function turnOffAll() {
            document.getElementById("red").classList.remove("active");
            document.getElementById("yellow").classList.remove("active");
            document.getElementById("green").classList.remove("active");
        }

        function startSignal() {
            state = 0;
            timeLeft = 2;
            
            interval = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").textContent = timeLeft;

                if (timeLeft <= 0) {
                    turnOffAll();
                    timeLeft = 2;
                    
                    if (state === 0) {
                        document.getElementById("red").classList.add("active");
                        state = 1;
                    } else if (state === 1) {
                        document.getElementById("yellow").classList.add("active");
                        state = 2;
                    } else {
                        document.getElementById("green").classList.add("active");
                        state = 0;
                    }
                }
            }, 1000);
        }

        function stopSignal() {
            clearInterval(interval);
            turnOffAll();
            document.getElementById("timer").textContent = "-";
            state = 0;
        }
    </script>
</body>
</html>
