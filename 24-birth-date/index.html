<!DOCTYPE html>
<html>
<head>
    <title>Age Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 0.95em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #764ba2; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .result { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 8px; display: none; }
        .result.show { display: block; animation: slideIn 0.3s ease; }
        .age-display { font-size: 1.5em; color: #333; margin-bottom: 15px; font-weight: 600; }
        .age-detail { display: flex; justify-content: space-around; text-align: center; }
        .detail-box { flex: 1; }
        .detail-number { font-size: 2em; font-weight: bold; color: #667eea; }
        .detail-label { color: #666; font-size: 0.9em; margin-top: 5px; }
        .error { color: #e74c3c; margin-top: 15px; display: none; }
        .error.show { display: block; }
        @media (max-width: 600px) { .container { padding: 25px; } h1 { font-size: 1.5em; } .age-detail { flex-wrap: wrap; gap: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎂 Age Calculator</h1>
        <p class="subtitle">Enter your birth date to calculate your exact age</p>
        
        <div class="form-group">
            <label for="dob">Birth Date:</label>
            <input type="date" id="dob">
        </div>
        
        <button onclick="calculateAge()">Calculate Age</button>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="age-display" id="ageText"></div>
            <div class="age-detail">
                <div class="detail-box">
                    <div class="detail-number" id="years">0</div>
                    <div class="detail-label">Years</div>
                </div>
                <div class="detail-box">
                    <div class="detail-number" id="months">0</div>
                    <div class="detail-label">Months</div>
                </div>
                <div class="detail-box">
                    <div class="detail-number" id="days">0</div>
                    <div class="detail-label">Days</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const dobInput = document.getElementById("dob").value;
            const errorDiv = document.getElementById("error");
            const resultDiv = document.getElementById("result");
            
            errorDiv.classList.remove("show");
            resultDiv.classList.remove("show");
            
            if (!dobInput) {
                errorDiv.textContent = "Please select your birth date";
                errorDiv.classList.add("show");
                return;
            }
            
            const birthDate = new Date(dobInput);
            const today = new Date();
            
            if (birthDate > today) {
                errorDiv.textContent = "Birth date cannot be in the future";
                errorDiv.classList.add("show");
                return;
            }
            
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();
            
            if (days < 0) {
                months--;
                const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
                days += prevMonth;
            }
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            document.getElementById("years").textContent = years;
            document.getElementById("months").textContent = months;
            document.getElementById("days").textContent = days;
            document.getElementById("ageText").textContent = `You are ${years} years, ${months} months, and ${days} days old`;
            
            resultDiv.classList.add("show");
        }
        
        document.getElementById("dob").addEventListener("keypress", function(e) {
            if (e.key === "Enter") calculateAge();
        });
    </script>
</body>
</html>
