<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<title>BookHaven - Online Bookstore</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; background: #faf8f5; color: #2d2d2d; }
nav { background: #1a1a2e; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
.logo { color: #e8c96d; font-size: 24px; font-weight: bold; text-decoration: none; }
nav a { color: rgba(255,255,255,0.8); text-decoration: none; margin-left: 20px; font-size: 15px; }
nav a:hover { color: #e8c96d; }
.hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 80px 40px; text-align: center; }
.hero h1 { font-size: 52px; margin-bottom: 15px; color: #e8c96d; }
.hero p { font-size: 20px; opacity: 0.8; margin-bottom: 30px; }
.btn { display: inline-block; padding: 14px 30px; background: #e8c96d; color: #1a1a2e; border-radius: 6px; text-decoration: none; font-weight: bold; margin: 5px; }
.btn-outline { background: transparent; color: #e8c96d; border: 2px solid #e8c96d; }
.section { padding: 60px 40px; }
.section h2 { font-size: 32px; margin-bottom: 30px; text-align: center; }
.books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
.book-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.08); transition: transform 0.2s; }
.book-card:hover { transform: translateY(-5px); }
.book-cover { height: 200px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 50px; }
.book-info { padding: 15px; }
.book-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
.book-author { color: #666; font-size: 14px; margin-bottom: 8px; }
.book-price { color: #e67e22; font-size: 18px; font-weight: bold; }
footer { background: #1a1a2e; color: rgba(255,255,255,0.6); text-align: center; padding: 30px; margin-top: 40px; }
</style>
</head>
<body>
<nav>
  <a href="/home" class="logo">📚 BookHaven</a>
  <div>
    <a href="/home">Home</a>
    <a href="/catalog">Catalog</a>
    <a sec:authorize="!isAuthenticated()" href="/login">Login</a>
    <a sec:authorize="!isAuthenticated()" href="/register">Register</a>
    <a sec:authorize="isAuthenticated()" href="/logout">Logout</a>
  </div>
</nav>

<div class="hero">
  <h1>📚 BookHaven</h1>
  <p>Discover your next great read. Thousands of books at your fingertips.</p>
  <a href="/catalog" class="btn">Browse Catalog</a>
  <a href="/register" class="btn btn-outline" sec:authorize="!isAuthenticated()">Get Started</a>
</div>

<div class="section">
  <h2>Featured Books</h2>
  <div class="books-grid">
    <div th:each="book : ${featuredBooks}" class="book-card">
      <div class="book-cover">📖</div>
      <div class="book-info">
        <div class="book-title" th:text="${book.title}">Title</div>
        <div class="book-author" th:text="${book.author}">Author</div>
        <div class="book-price">₹<span th:text="${book.price}">299</span></div>
      </div>
    </div>
  </div>
</div>

<footer><p>© 2024 BookHaven Online Bookstore. All rights reserved.</p></footer>
</body>
</html>
