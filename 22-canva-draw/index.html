<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Drawing App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
    }

    h2 {
        margin-top: 10px;
    }

    .toolbar {
        margin: 10px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    canvas {
        border: 2px solid black;
        width: 90%;
        height: 70vh;
        background: white;
    }
</style>
</head>

<body>

<h2>Canvas Drawing Tool</h2>

<div class="toolbar">
    <button onclick="setMode('line')">Draw Line</button>
    <button onclick="setMode('rect')">Draw Rectangle</button>
    <button onclick="clearCanvas()">Clear</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let startX, startY;
let mode = "line";

// Resize canvas for responsiveness
function resizeCanvas() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// Set drawing mode
function setMode(m) {
    mode = m;
}

// Mouse Down Event
canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    startX = e.offsetX;
    startY = e.offsetY;
});

// Mouse Up Event
canvas.addEventListener("mouseup", (e) => {
    if (!drawing) return;

    let endX = e.offsetX;
    let endY = e.offsetY;

    if (mode === "line") {
        drawLine(startX, startY, endX, endY);
    } else if (mode === "rect") {
        drawRect(startX, startY, endX - startX, endY - startY);
    }

    drawing = false;
});

// Draw Line
function drawLine(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.stroke();
}

// Draw Rectangle
function drawRect(x, y, w, h) {
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();
}

// Clear Canvas
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
